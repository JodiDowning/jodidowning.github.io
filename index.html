<script>
  // Fade-in on scroll
  const faders = document.querySelectorAll('.fade-in');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('opacity-100', 'translate-y-0');
      }
    });
  });

  faders.forEach(el => {
    el.classList.add('opacity-0', 'translate-y-5', 'transition', 'duration-700');
    observer.observe(el);
  });

  // Theme toggle
  const toggleBtn = document.getElementById('theme-toggle');
  const darkIcon = document.getElementById('theme-toggle-dark-icon');
  const lightIcon = document.getElementById('theme-toggle-light-icon');

  function setTheme(isDark) {
    if (isDark) {
      document.documentElement.classList.add('dark');
      localStorage.setItem('theme', 'dark');

      darkIcon.classList.add('opacity-0', 'rotate-90');
      lightIcon.classList.remove('hidden');
      setTimeout(() => {
        lightIcon.classList.remove('opacity-0', '-rotate-90');
        darkIcon.classList.add('hidden');
      }, 150);

    } else {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('theme', 'light');

      lightIcon.classList.add('opacity-0', '-rotate-90');
      darkIcon.classList.remove('hidden');
      setTimeout(() => {
        darkIcon.classList.remove('opacity-0', 'rotate-90');
        lightIcon.classList.add('hidden');
      }, 150);
    }
  }

  // Initial load
  const isDark =
    localStorage.getItem('theme') === 'dark' ||
    (!localStorage.getItem('theme') &&
      window.matchMedia('(prefers-color-scheme: dark)').matches);

  setTheme(isDark);

  toggleBtn.addEventListener('click', () => {
    const isDarkNow = document.documentElement.classList.contains('dark');
    setTheme(!isDarkNow);
  });
</script>
